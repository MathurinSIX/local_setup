# Local stack: Traefik + PostgreSQL + MinIO
# Long-running services use restart: on-failure so Docker restarts them after a crash (non-zero exit).
# Traefik publishes HTTP/HTTPS. Postgres publishes POSTGRES_PORT on the host directly (not via Traefik).
# MinIO: http://minio.<TRAEFIK_DOMAIN>/ and http://minio-console.<TRAEFIK_DOMAIN>/ on port 80.
# Put secrets in .env in this directory for anything beyond local dev.

x-minio-root: &minio-root
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

name: local-stack

# Shared bridge: must exist before `docker compose up` (e.g. `docker network create traefik-public`
# or risk-control `just up`). Marked external so Compose does not warn when the net was not created by this project.
networks:
  traefik-public:
    external: true

volumes:
  postgres_data:
  minio_data:

services:
  traefik:
    # v3.6+ negotiates Docker API version (required for Docker Engine 29+ / MinAPIVersion 1.44).
    image: traefik:v3.6
    restart: on-failure
    command:
      - --api.dashboard=true
      # Dashboard and raw API are routed on entrypoint `web` (port 80), not on :8080.
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik-public
      - --providers.file.filename=/etc/traefik/dynamic/dashboard.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dashboard.yml:/etc/traefik/dynamic/dashboard.yml:ro
    networks:
      - traefik-public

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - traefik-public

  minio:
    image: minio/minio:latest
    restart: on-failure
    environment:
      <<: *minio-root
      # Public URLs when reached only via Traefik (HTTP on port 80).
      MINIO_SERVER_URL: http://minio.${TRAEFIK_DOMAIN:-localhost}
      MINIO_BROWSER_REDIRECT_URL: http://minio-console.${TRAEFIK_DOMAIN:-localhost}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # Exec-form CMD can be prefixed by the image entrypoint; use shell + curl.
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      # S3 API and console are only reachable via Traefik on port 80 (Host-based routing).
      - traefik.http.routers.minio-s3.rule=Host(`minio.${TRAEFIK_DOMAIN:-localhost}`)
      - traefik.http.routers.minio-s3.entrypoints=web
      - traefik.http.services.minio-s3.loadbalancer.server.port=9000
      - traefik.http.routers.minio-console.rule=Host(`minio-console.${TRAEFIK_DOMAIN:-localhost}`)
      - traefik.http.routers.minio-console.entrypoints=web
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
